<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holy Technologies | Marketing Hub</title>


<style>
/* ============================================================
   HOLY TECHNOLOGIES DESIGN SYSTEM STYLES
   (colors, fonts and buttons follow the Brand Book 2026)
   ============================================================ */

* { margin: 0; padding: 0; box-sizing: border-box; text-align: left; }

body {
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  background: #F1F5F5;
  min-height: 100vh;
}

.hub-header {
  background: #021F1D;
  padding: 48px 0 56px;
}

/* Keeps content centered with comfortable side space on every screen */
.inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px;
}

.hub-eyebrow {
  font-weight: 700;
  font-size: 18px;
  line-height: 1.0;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #9FD016;
  margin-bottom: 12px;
}

.hub-title {
  font-weight: 700;
  font-size: 32px;
  line-height: 1.2;
  color: #FFFFFF;
  margin-bottom: 12px;
}

.hub-logo {
  height: 38px;   /* rule: logo never larger than the h1/h2 title in its element */
  width: auto;
  margin-bottom: 40px;   /* clear space around the logo per brand book */
}

.hub-logo svg { height: 100%; width: auto; display: block; }

.hub-body {
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.75);
  max-width: 560px;
}

.grid-container {
  padding: 40px 48px 48px;
  max-width: 1296px;   /* 1200px content + side padding */
  margin: 0 auto;
}

/* Section heading above each group of cards */
.section-title {
  font-weight: 700;
  font-size: 27px;
  line-height: 1.2;
  color: #151415;
  margin: 32px 0 16px;
}

.section-block:first-child .section-title { margin-top: 0; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: #FFFFFF;
  border: 1px solid #D0D5D0;
  border-radius: 5px;
  padding: 32px;
  display: flex;
  flex-direction: column;
}

.card-icon {
  width: 30px;
  height: 30px;
  color: #9FD016;
  margin-bottom: 12px;
  display: block;
}

.card-icon svg { width: 100%; height: 100%; }

.btn-icon { width: 16px; height: 16px; display: inline-flex; }
.btn-icon svg { width: 100%; height: 100%; }

.card-title {
  font-weight: 700;
  font-size: 22px;
  line-height: 1.2;
  color: #151415;
  margin-bottom: 10px;
}

.card-desc {
  font-weight: 400;
  font-size: 15px;
  line-height: 1.6;
  color: #364950;
  flex: 1;
  margin-bottom: 20px;
}

.card-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 360px;
  min-height: 34px;
  padding: 7px 22px;
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  font-weight: 500;
  font-size: 16px;
  line-height: 1.0;
  background: #151415;
  color: #FFFFFF;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s ease;
  width: fit-content;
}

.card-btn:hover { transform: scale(1.04); }

/* Very wide screens: four cards per row */
@media (min-width: 1500px) {
  .grid-container, .inner { max-width: 1500px; }
  .grid { grid-template-columns: repeat(4, 1fr); }
}

/* Tablets: two cards per row */
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .inner, .grid-container { padding-left: 32px; padding-right: 32px; }
  .hub-header { padding: 32px 0 40px; }
  .grid-container { padding-top: 32px; padding-bottom: 32px; }
}

/* Phones: one card per row, tighter spacing, smaller titles */
@media (max-width: 560px) {
  .grid { grid-template-columns: 1fr; }
  .inner, .grid-container { padding-left: 20px; padding-right: 20px; }
  .hub-header { padding: 24px 0 32px; }
  .hub-title { font-size: 26px; }
  .hub-logo { height: 31px; margin-bottom: 32px; }   /* matches the smaller mobile h1 */
  .section-title { font-size: 22px; }
  .card { padding: 24px; }
  .edit-toolbar { padding: 12px 20px; }
  .edit-toolbar-label { width: 100%; margin-right: 0; }
  .toolbar-btn { flex: 1; }
}

/* ============================================================
   EDIT MODE STYLES
   Everything below only shows when the page is opened
   with ?edit (or #edit) in the address bar.
   ============================================================ */

.edit-toolbar {
  display: none;
  background: #364950;
  padding: 16px 48px;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

body.editing .edit-toolbar { display: flex; }

.edit-toolbar-label {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #9FD016;
  margin-right: auto;
}

.toolbar-btn {
  border-radius: 360px;
  min-height: 34px;
  padding: 7px 22px;
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  font-weight: 500;
  font-size: 16px;
  line-height: 1.0;
  background: transparent;
  color: #9FD016;
  border: 1px solid #9FD016;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.toolbar-btn:hover { transform: scale(1.04); }

.toolbar-btn.primary {
  background: #9FD016;
  color: #021F1D;
  border: none;
}

/* Anything the user can type in gets a subtle dashed outline */
body.editing [contenteditable="true"] {
  outline: 1px dashed #9FD016;
  outline-offset: 3px;
  min-width: 40px;
  cursor: text;
}

.link-input {
  border-radius: 360px;
  background-color: #FFFFFF;
  border: 1px solid #D0D5D0;
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  font-weight: 400;
  font-size: 14px;
  color: #151415;
  padding: 8px 16px;
  width: 100%;
  margin-bottom: 12px;
  box-shadow: none;
}

.link-input:focus {
  border-color: #9FD016;
  background-color: #F1F5F5;
  outline: none;
}

.link-label {
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #364950;
  display: block;
  margin-bottom: 6px;
}

/* Small round controls on cards and sections (delete, move) */
.mini-controls { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }

.mini-btn {
  border-radius: 360px;
  min-height: 28px;
  padding: 6px 14px;
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  font-weight: 700;
  font-size: 12px;
  line-height: 1.0;
  background: transparent;
  color: #151415;
  border: 1px solid #D0D5D0;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.mini-btn:hover { transform: scale(1.04); }

.section-controls { display: inline-flex; gap: 6px; margin-left: 12px; vertical-align: middle; }

/* The "add card" tile shown at the end of each grid in edit mode */
.add-card-tile {
  border: 1px dashed #D0D5D0;
  border-radius: 5px;
  min-height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  cursor: pointer;
  font-family: 'Gotham', 'GothamPro', Arial, Helvetica, sans-serif;
  font-weight: 500;
  font-size: 16px;
  color: #364950;
  transition: transform 0.15s ease;
}

.add-card-tile:hover { transform: scale(1.02); }
</style>
</head>

// ---- 1. Load the data ----
var data = JSON.parse(document.getElementById('hub-data').textContent);

// ---- 2. Are we in edit mode? ----
// True when the address contains ?edit or #edit
var editMode = window.location.search.indexOf('edit') !== -1
            || window.location.hash.indexOf('edit') !== -1;

if (editMode) { document.body.classList.add('editing'); }

// Small helper so typed text can never break the page
function esc(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ---- 3. Draw the page from the data ----
// "editing" decides whether edit controls are included.
function render(editing) {
  var content = document.getElementById('content');
  content.innerHTML = '';

  data.sections.forEach(function (section, sIndex) {
    var block = document.createElement('div');
    block.className = 'section-block';

    // Section heading (typeable in edit mode)
    var heading = document.createElement('h2');
    heading.className = 'section-title';
    heading.textContent = section.title;
    if (editing) {
      heading.contentEditable = 'true';
      heading.addEventListener('input', function () {
        data.sections[sIndex].title = heading.textContent;
      });
    }
    block.appendChild(heading);

    // Section controls: move up, move down, delete
    if (editing) {
      var sc = document.createElement('span');
      sc.className = 'section-controls';
      sc.innerHTML =
        '<button class="mini-btn" data-act="sec-up">Move up</button>' +
        '<button class="mini-btn" data-act="sec-down">Move down</button>' +
        '<button class="mini-btn" data-act="sec-del">Delete section</button>';
      sc.addEventListener('click', function (e) {
        var act = e.target.getAttribute('data-act');
        if (act === 'sec-up' && sIndex > 0) {
          data.sections.splice(sIndex - 1, 0, data.sections.splice(sIndex, 1)[0]);
        }
        if (act === 'sec-down' && sIndex < data.sections.length - 1) {
          data.sections.splice(sIndex + 1, 0, data.sections.splice(sIndex, 1)[0]);
        }
        if (act === 'sec-del') {
          var ok = confirm('Delete the section "' + section.title + '" and all its cards?');
          if (!ok) return;
          data.sections.splice(sIndex, 1);
        }
        render(true);
      });
      heading.after(sc);
      block.appendChild(sc);
    }

    // The card grid for this section
    var grid = document.createElement('div');
    grid.className = 'grid';

    section.cards.forEach(function (card, cIndex) {
      var el = document.createElement('div');
      el.className = 'card';

      el.innerHTML =
        '<span class="card-icon" aria-hidden="true">' + (ICONS[card.icon] || ICONS['file']) + '</span>' +
        '<h2 class="card-title">' + esc(card.title) + '</h2>' +
        '<p class="card-desc">' + esc(card.desc) + '</p>';

      if (editing) {
        // Make the texts typeable and save changes into the data
        ['card-title', 'card-desc'].forEach(function (cls, i) {
          var node = el.querySelector('.' + cls);
          node.contentEditable = 'true';
          node.addEventListener('input', function () {
            var keys = ['title', 'desc'];
            data.sections[sIndex].cards[cIndex][keys[i]] = node.textContent;
          });
        });

        // Link box instead of a live button
        var label = document.createElement('label');
        label.className = 'link-label';
        label.textContent = 'Button links to';
        el.appendChild(label);

        var input = document.createElement('input');
        input.className = 'link-input';
        input.type = 'text';
        input.value = card.link;
        input.placeholder = 'https://...';
        input.addEventListener('input', function () {
          data.sections[sIndex].cards[cIndex].link = input.value;
        });
        el.appendChild(input);

        // Card controls: move and delete
        var mc = document.createElement('div');
        mc.className = 'mini-controls';
        mc.innerHTML =
          '<button class="mini-btn" data-act="up">Move up</button>' +
          '<button class="mini-btn" data-act="down">Move down</button>' +
          '<button class="mini-btn" data-act="del">Delete card</button>';
        mc.addEventListener('click', function (e) {
          var act = e.target.getAttribute('data-act');
          var cards = data.sections[sIndex].cards;
          if (act === 'up' && cIndex > 0) {
            cards.splice(cIndex - 1, 0, cards.splice(cIndex, 1)[0]);
          }
          if (act === 'down' && cIndex < cards.length - 1) {
            cards.splice(cIndex + 1, 0, cards.splice(cIndex, 1)[0]);
          }
          if (act === 'del') {
            var ok = confirm('Delete the card "' + card.title + '"?');
            if (!ok) return;
            cards.splice(cIndex, 1);
          }
          render(true);
        });
        el.appendChild(mc);
      } else {
        // Normal visitors get the real button
        var btn = document.createElement('a');
        btn.className = 'card-btn';
        btn.href = card.link;
        btn.target = '_blank';
        btn.innerHTML = 'Open <span class="btn-icon" aria-hidden="true">' + ICONS['arrow-right'] + '</span>';
        el.appendChild(btn);
      }

      grid.appendChild(el);
    });

    // "Add a card" tile at the end of the grid (edit mode only)
    if (editing) {
      var addTile = document.createElement('button');
      addTile.className = 'add-card-tile';
      addTile.textContent = '+ Add a card';
      addTile.addEventListener('click', function () {
        data.sections[sIndex].cards.push({
          icon: 'file',
          title: 'New card.',
          desc: 'Describe this asset here.',
          link: '#'
        });
        render(true);
      });
      grid.appendChild(addTile);
    }

    block.appendChild(grid);
    content.appendChild(block);
  });
}

// ---- 4. Toolbar buttons (edit mode only) ----
document.getElementById('btn-add-section').addEventListener('click', function () {
  data.sections.push({ title: 'New section', cards: [] });
  render(true);
});

document.getElementById('btn-download').addEventListener('click', function () {
  // Step 1: write the current data back into the JSON block
  document.getElementById('hub-data').textContent =
    '\n' + JSON.stringify(data, null, 2) + '\n';

  // Step 2: briefly redraw the page as a normal visitor sees it,
  // so the saved file contains a clean page
  document.body.classList.remove('editing');
  render(false);

  // Step 3: turn the whole page into a text file and download it
  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  var blob = new Blob([html], { type: 'text/html' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'marketing-hub.html';
  a.click();
  URL.revokeObjectURL(a.href);

  // Step 4: switch edit mode back on so you can keep working
  document.body.classList.add('editing');
  render(true);
});

// ---- 5. Publish straight to GitHub ----
// Where the live site lives. Change these if the repo ever moves.
var GITHUB = {
  owner: 'holy-technologies',
  repo: 'marketing-hub',
  path: 'index.html',
  branch: 'main'
};

// Builds the full HTML of the page with current edits baked in
// (same steps as the download button)
function buildHtml() {
  document.getElementById('hub-data').textContent =
    '\n' + JSON.stringify(data, null, 2) + '\n';
  document.body.classList.remove('editing');
  render(false);
  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  document.body.classList.add('editing');
  render(true);
  return html;
}

// Turns text into the base64 format the GitHub API expects
function toBase64(text) {
  var bytes = new TextEncoder().encode(text);
  var bin = '';
  bytes.forEach(function (b) { bin += String.fromCharCode(b); });
  return btoa(bin);
}

// Gets the saved token, or asks for it the first time
function getToken() {
  var token = localStorage.getItem('hub-github-token');
  if (!token) {
    token = prompt('Paste your GitHub access token (asked only once, stays on this computer):');
    if (token) { localStorage.setItem('hub-github-token', token.trim()); }
  }
  return token;
}

document.getElementById('btn-publish').addEventListener('click', function () {
  var token = getToken();
  if (!token) { return; }

  var apiUrl = 'https://api.github.com/repos/' + GITHUB.owner + '/' + GITHUB.repo +
               '/contents/' + GITHUB.path;
  var headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json'
  };
  var btn = this;
  btn.textContent = 'Publishing...';
  btn.disabled = true;

  function done(message) {
    btn.textContent = 'Publish to live site';
    btn.disabled = false;
    alert(message);
  }

  // Step 1: ask GitHub for the current file's id (its "sha"),
  // which GitHub requires before accepting an update
  fetch(apiUrl + '?ref=' + GITHUB.branch, { headers: headers })
    .then(function (res) {
      if (res.status === 401) { throw new Error('badtoken'); }
      if (!res.ok) { throw new Error('HTTP ' + res.status); }
      return res.json();
    })
    .then(function (file) {
      // Step 2: send the updated page
      return fetch(apiUrl, {
        method: 'PUT',
        headers: headers,
        body: JSON.stringify({
          message: 'Update marketing hub via edit mode',
          content: toBase64(buildHtml()),
          sha: file.sha,
          branch: GITHUB.branch
        })
      });
    })
    .then(function (res) {
      if (!res.ok) { throw new Error('HTTP ' + res.status); }
      done('Published! The live page updates in a minute or two.');
    })
    .catch(function (err) {
      if (err.message === 'badtoken') {
        localStorage.removeItem('hub-github-token');
        done('That token was not accepted. Click Publish again and paste a fresh one.');
      } else {
        done('Publishing failed (' + err.message + '). Your edits are still on screen. You can use Download backup instead.');
      }
    });
});

// ---- 6. First draw ----
render(editMode);
